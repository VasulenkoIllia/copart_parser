services:
  mysql:
    image: mysql:8.4
    container_name: copart-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE_CORE:-copart_core}
      MYSQL_USER: ${MYSQL_USER:-copart}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-copart}
      MYSQL_DATABASE_CORE: ${MYSQL_DATABASE_CORE:-copart_core}
      MYSQL_DATABASE_MEDIA: ${MYSQL_DATABASE_MEDIA:-copart_media}
    ports:
      - "${MYSQL_PORT_EXTERNAL:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - mysql_data_v4:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copart-parser
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro
    command: ["node", "dist/index.js", "scheduler:start"]

volumes:
  mysql_data_v4:
